<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBKR Trading Dashboard</title>
    <!-- Use Bootstrap CSS for a quick layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f8f9fa; 
            padding-top: 40px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card { 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border: none;
            border-radius: 10px;
        }
        .card-header {
            border-radius: 10px 10px 0 0 !important;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h2 class="m-0 fw-bold">My Trading Dashboard</h2>
            <small class="text-secondary" id="last-updated">Updating...</small>
        </div>

        <!-- Account Data Cards Row -->
        <div class="row mb-4" id="account-cards">
            <!-- Cards will be populated by JS -->
            <div class="col-md-3"><div class="card p-3"><h6 class="text-muted">Net Liquidation</h6><h4 class="fw-bold">-</h4></div></div>
            <div class="col-md-3"><div class="card p-3"><h6 class="text-muted">Total Cash</h6><h4 class="fw-bold">-</h4></div></div>
            <div class="col-md-3"><div class="card p-3"><h6 class="text-muted">Available Funds</h6><h4 class="fw-bold">-</h4></div></div>
            <div class="col-md-3"><div class="card p-3"><h6 class="text-muted">Buying Power</h6><h4 class="fw-bold">-</h4></div></div>
        </div>
        
        <div class="card">
            <div class="card-header bg-dark text-white p-3">
                <h5 class="mb-0 fw-semibold">Current Portfolio Positions</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover table-striped m-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Account</th>
                            <th>Symbol</th>
                            <th>Asset Class</th>
                            <th>Position Size</th>
                            <th>Average Cost</th>
                        </tr>
                    </thead>
                    <tbody id="positions-body">
                        <tr><td colspan="5" class="text-center text-muted py-4">Fetching positions...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchPositions() {
            try {
                // Fetch our API endpoint returning JSON positions
                const response = await fetch('/api/positions');
                const data = await response.json();
                
                const tbody = document.getElementById('positions-body');
                
                // If there are no open positions
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No open positions.</td></tr>';
                } else {
                    // Empty the table and begin populating
                    tbody.innerHTML = '';
                    data.forEach(pos => {
                        const isLongInfo = pos.position > 0;
                        
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="ps-4 text-secondary">${pos.account}</td>
                            <td><strong class="text-primary">${pos.symbol}</strong></td>
                            <td><span class="badge bg-secondary">${pos.secType}</span></td>
                            <td class="fw-bold ${isLongInfo ? 'text-success' : 'text-danger'}">${pos.position}</td>
                            <td>$${pos.avgCost.toFixed(2)}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }
                
                // Also fetch Account details
                const accResponse = await fetch('/api/account');
                const accData = await accResponse.json();
                
                const formatMoney = (val, currency) => {
                    if (!val) return '-';
                    return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency || 'USD' }).format(val.value);
                };

                const accountHtml = `
                    <div class="col-md-3">
                        <div class="card p-3 border-0 shadow-sm">
                            <h6 class="text-muted mb-1">Net Liquidation</h6>
                            <h4 class="fw-bold text-dark m-0">${formatMoney(accData.NetLiquidation, accData.NetLiquidation?.currency)}</h4>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 border-0 shadow-sm">
                            <h6 class="text-muted mb-1">Total Cash</h6>
                            <h4 class="fw-bold text-dark m-0">${formatMoney(accData.TotalCashValue, accData.TotalCashValue?.currency)}</h4>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 border-0 shadow-sm">
                            <h6 class="text-muted mb-1">Available Funds</h6>
                            <h4 class="fw-bold text-dark m-0">${formatMoney(accData.AvailableFunds, accData.AvailableFunds?.currency)}</h4>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 border-0 shadow-sm">
                            <h6 class="text-muted mb-1">Buying Power</h6>
                            <h4 class="fw-bold text-primary m-0">${formatMoney(accData.BuyingPower, accData.BuyingPower?.currency)}</h4>
                        </div>
                    </div>
                `;
                document.getElementById('account-cards').innerHTML = accountHtml;

                // Update the "Last Updated" timestamp text
                const now = new Date();
                document.getElementById('last-updated').innerText = "Last Updated: " + now.toLocaleTimeString();

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // Fetch immediately, then ping the backend every 3 seconds for updates
        fetchPositions();
        setInterval(fetchPositions, 3000);
    </script>
</body>
</html>
